name: release
on:
  push:
    tags: ["v*"]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest        # Apple Silicon
            args: --target aarch64-apple-darwin
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm, cache-dependency-path: app/pnpm-lock.yaml }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - run: pnpm install --frozen-lockfile
        working-directory: app
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: "gcode ${{ github.ref_name }}"
          releaseBody: "Автосборка. macOS без подписи: правый клик → Open при первом запуске."
          releaseDraft: true
          args: ${{ matrix.args }}
